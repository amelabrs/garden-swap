<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4px rhythm; 16px is the default screen gutter" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--green-mid); border-radius: 3px; width: 100%; }
  .cell { width: 52px; }
  .lbl { font-size: var(--text-xs); color: var(--text-subtle); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="item cell"><div class="bar" style="height:4px"></div><span class="lbl">1 · 4</span></div>
    <div class="item cell"><div class="bar" style="height:8px"></div><span class="lbl">3 · 8</span></div>
    <div class="item cell"><div class="bar" style="height:12px"></div><span class="lbl">5 · 12</span></div>
    <div class="item cell"><div class="bar" style="height:16px"></div><span class="lbl">7 · 16</span></div>
    <div class="item cell"><div class="bar" style="height:24px"></div><span class="lbl">9 · 24</span></div>
    <div class="item cell"><div class="bar" style="height:48px"></div><span class="lbl">12 · 48</span></div>
  </div>
</body>
</html>
