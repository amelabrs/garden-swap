<!-- @dsCard group="Colors" viewport="700x150" name="Greens — pine to mint" subtitle="The primary ramp: chrome, actions, fills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; background: var(--card); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius); box-shadow: var(--shadow-xs); }
  .name { font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pine-900)"></div><span class="name">pine-900</span><span class="hex">#12301D</span></div>
    <div class="sw"><div class="chip" style="background:var(--pine-700)"></div><span class="name">pine-700</span><span class="hex">#1A4226</span></div>
    <div class="sw"><div class="chip" style="background:var(--fern-600)"></div><span class="name">fern-600</span><span class="hex">#285C39</span></div>
    <div class="sw"><div class="chip" style="background:var(--fern-400)"></div><span class="name">fern-400</span><span class="hex">#4C8A5C</span></div>
    <div class="sw"><div class="chip" style="background:var(--sage-300)"></div><span class="name">sage-300</span><span class="hex">#A6B898</span></div>
    <div class="sw"><div class="chip" style="background:var(--mint-100);border:1px solid var(--line)"></div><span class="name">mint-100</span><span class="hex">#E7EFDC</span></div>
  </div>
</body>
</html>
