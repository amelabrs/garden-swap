<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation" subtitle="Soft layered paper-toned shadows; green FAB glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 28px 22px; background: var(--card); }
  .row { display: flex; gap: 30px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .card { width: 120px; height: 60px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-card); }
  .rest { box-shadow: var(--shadow); }
  .hover { box-shadow: var(--shadow-hover); transform: var(--lift); }
  .fab { width: 58px; height: 58px; border-radius: var(--radius-full); background: var(--fern-600); color: #fff; box-shadow: var(--shadow-fab); display: flex; align-items: center; justify-content: center; }
  .lbl { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="card rest"></div><span class="lbl">shadow (rest)</span></div>
    <div class="item"><div class="card hover"></div><span class="lbl">shadow-hover + lift</span></div>
    <div class="item"><div class="fab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></div><span class="lbl">shadow-fab</span></div>
  </div>
</body>
</html>
