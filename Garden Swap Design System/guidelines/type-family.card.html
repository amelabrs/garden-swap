<!-- @dsCard group="Type" viewport="700x190" name="Font pairing" subtitle="Newsreader (serif) + Hanken Grotesk (sans)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; background: var(--card); display: flex; gap: 28px; }
  .col { flex: 1; }
  .tag { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); margin-bottom: 8px; }
  .big-serif { font-family: var(--font-serif); font-size: 2.4rem; font-weight: 400; color: var(--fern-600); letter-spacing: var(--tracking-tight); line-height: 1.05; }
  .big-sans { font-family: var(--font-sans); font-size: 2.4rem; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; line-height: 1.05; }
  .alpha { font-size: var(--text-sm); color: var(--text-subtle); margin-top: 8px; }
</style>
</head>
<body>
  <div class="col">
    <div class="tag">Newsreader — display</div>
    <div class="big-serif">Grow, swap,<br>repeat.</div>
    <div class="alpha" style="font-family:var(--font-serif)">Aa Bb Cc · 0123 · <em>italic</em></div>
  </div>
  <div class="col">
    <div class="tag">Hanken Grotesk — UI / body</div>
    <div class="big-sans">Plants near<br>your door.</div>
    <div class="alpha" style="font-family:var(--font-sans)">Aa Bb Cc · 0123 · 4.9★</div>
  </div>
</body>
</html>
