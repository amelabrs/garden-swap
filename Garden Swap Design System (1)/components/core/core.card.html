<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 22px; background: var(--paper); }
  .block { margin-bottom: 20px; }
  .label { font-family: var(--font-sans); font-size: var(--text-xs); color: var(--text-faint); text-transform: uppercase; letter-spacing: var(--tracking-caps); margin-bottom: 10px; font-weight: var(--weight-semibold); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .icons { display: flex; gap: 14px; flex-wrap: wrap; color: var(--fern-600); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge, TierBadge, Card, Icon } = window.GardenSwapDesignSystem_0373cf;
    function Demo() {
      return (
        <div>
          <div className="block">
            <div className="label">Button</div>
            <div className="row">
              <Button variant="primary"><Icon name="repeat" size={16} /> Request Swap</Button>
              <Button variant="accent">Reserve plant</Button>
              <Button variant="steward">Upgrade to Steward</Button>
              <Button variant="danger" size="sm"><Icon name="x" size={15} /> Decline</Button>
              <Button variant="outline" size="sm">Manage Plan</Button>
              <Button variant="text">+ Add</Button>
            </div>
          </div>
          <div className="block">
            <div className="label">Badge</div>
            <div className="row">
              <Badge variant="swap"><Icon name="repeat" size={12} /> Swap</Badge>
              <Badge variant="free"><Icon name="gift" size={12} /> Free</Badge>
              <Badge variant="type">Houseplant</Badge>
              <Badge variant="condition">Needs TLC</Badge>
              <Badge variant="rarity"><Icon name="sparkles" size={11} /> Rare</Badge>
              <Badge variant="accepted">Accepted</Badge>
            </div>
          </div>
          <div className="block">
            <div className="label">TierBadge</div>
            <div className="row">
              <TierBadge tier="sprout" />
              <TierBadge tier="grower" />
              <TierBadge tier="steward" />
            </div>
          </div>
          <div className="block">
            <div className="label">Icon — line set (replaces emoji)</div>
            <div className="icons">
              {['leaf','sprout','shrub','trees','flower','sun','droplet','mapPin','bell','message','user','heart','repeat','gift','star','lock','sliders','handshake','newspaper','sparkles'].map(n => <Icon key={n} name={n} size={22} />)}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
