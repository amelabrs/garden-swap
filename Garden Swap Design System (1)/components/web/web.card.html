<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garden Swap — Web Components</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  .section { padding: 28px 0; border-bottom: 1px solid var(--line); }
  .section:last-child { border-bottom: none; }
  .label {
    font-family: var(--font-sans); font-size: var(--text-xs);
    font-weight: 700; text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .inner { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Nav, Footer, Sidebar, Pagination, Breadcrumb, Alert, PlantCard } =
  window.GardenSwapDesignSystem_0373cf;

function WebCard() {
  const [filters, setFilters] = React.useState({ status: 'swap' });
  const [page, setPage] = React.useState(2);

  return (
    <div>
      {/* Nav — logged-in with tier */}
      <div className="section" style={{ padding: 0 }}>
        <Nav
          page="browse"
          user={{ name: 'Priya Sharma', tier: 'grower' }}
          notifCount={2}
        />
      </div>

      <div className="inner">
        {/* Breadcrumb */}
        <div className="section">
          <div className="label">Breadcrumb</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Breadcrumb items={[{ label: 'Home' }, { label: 'Browse Plants' }]} />
            <Breadcrumb items={[
              { label: 'Home' },
              { label: 'Browse Plants' },
              { label: 'Houseplants' },
              { label: 'Monstera Deliciosa' },
            ]} />
          </div>
        </div>

        {/* Alert */}
        <div className="section">
          <div className="label">Alert</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Alert variant="success" title="Swap accepted!">
              Meera accepted your request. Meet at the cafe on Saturday at 11 am.
            </Alert>
            <Alert variant="info" title="Tip">
              Add at least 3 photos to your listing to get 2× more responses.
            </Alert>
            <Alert variant="warning" title="Unverified listing">
              This lister hasn't completed identity verification yet.
            </Alert>
            <Alert variant="error" title="Request declined" dismissible>
              Priya is no longer able to swap this plant. Try another listing.
            </Alert>
          </div>
        </div>

        {/* Sidebar + layout preview */}
        <div className="section">
          <div className="label">Filter Sidebar</div>
          <div style={{ display: 'flex', gap: 40, alignItems: 'flex-start' }}>
            <Sidebar
              filters={filters}
              onChange={setFilters}
              onClear={() => setFilters({})}
              resultCount={34}
            />
            <div style={{
              flex: 1, background: 'var(--paper-raised)',
              border: '1px solid var(--line)', borderRadius: 'var(--radius-card)',
              padding: 24, color: 'var(--text-faint)', fontSize: 'var(--text-sm)',
              fontFamily: 'var(--font-sans)', minHeight: 200,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              ← Filter state drives the plant grid here
            </div>
          </div>
        </div>

        {/* Pagination */}
        <div className="section">
          <div className="label">Pagination</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <Pagination page={page} totalPages={8} onPage={setPage} />
            <Pagination page={1} totalPages={3} onPage={() => {}} />
          </div>
        </div>

        {/* Nav — logged out */}
        <div className="section">
          <div className="label">Nav — logged out</div>
          <div style={{ borderRadius: 'var(--radius-card)', overflow: 'hidden' }}>
            <Nav page="home" />
          </div>
        </div>
      </div>

      {/* Footer */}
      <div className="section" style={{ padding: 0, marginTop: 8 }}>
        <Footer />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WebCard />);
</script>
</body>
</html>
