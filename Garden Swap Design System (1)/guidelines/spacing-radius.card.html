<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="Organic rounding — 12px controls, 18px cards, pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; background: var(--card); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 76px; height: 58px; background: var(--mint-100); border: 1.5px solid var(--fern-400); }
  .lbl { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
  .pill { width: 96px; height: 38px; border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; font-family: var(--font-sans); font-size: var(--text-xs); color: var(--fern-600); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius)"></div><span class="lbl">base · 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-card)"></div><span class="lbl">card · 18</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 24</span></div>
    <div class="item"><div class="box pill">pill</div><span class="lbl">pill · ∞</span></div>
  </div>
</body>
</html>
