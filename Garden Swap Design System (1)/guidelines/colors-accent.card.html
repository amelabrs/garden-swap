<!-- @dsCard group="Colors" viewport="700x150" name="Clay, honey & plum" subtitle="Warm accents: gifts, ratings, premium, rarity" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; background: var(--card); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--radius); box-shadow: var(--shadow-xs); }
  .name { font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clay-600)"></div><span class="name">clay-600</span><span class="hex">#B85C38</span></div>
    <div class="sw"><div class="chip" style="background:var(--clay-100);border:1px solid var(--line)"></div><span class="name">clay-100</span><span class="hex">#F4E5D9</span></div>
    <div class="sw"><div class="chip" style="background:var(--honey-500)"></div><span class="name">honey-500</span><span class="hex">#DEA431</span></div>
    <div class="sw"><div class="chip" style="background:var(--honey-100);border:1px solid var(--line)"></div><span class="name">honey-100</span><span class="hex">#F8EDD3</span></div>
    <div class="sw"><div class="chip" style="background:var(--plum-500)"></div><span class="name">plum-500</span><span class="hex">#7B5A86</span></div>
    <div class="sw"><div class="chip" style="background:var(--denim-600)"></div><span class="name">denim-600</span><span class="hex">#2E5E6E</span></div>
  </div>
</body>
</html>
