<!-- @dsCard group="Type" viewport="700x140" name="Badge & meta type" subtitle="Uppercase eyebrow pills and muted meta lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; background: var(--card); display: flex; flex-direction: column; gap: 14px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    padding: 3px 9px; border-radius: var(--radius-badge); font-family: var(--font-sans);
    font-size: var(--text-xs); font-weight: var(--weight-semibold);
    text-transform: uppercase; letter-spacing: var(--tracking-caps);
  }
  .swap { background: var(--badge-swap-fill); color: var(--badge-swap-text); }
  .free { background: var(--badge-free-fill); color: var(--badge-free-text); }
  .type { background: rgba(166,184,152,0.28); color: #41553A; }
  .meta { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--text-subtle); display: flex; gap: 14px; }
  .meta b { color: var(--honey-600); }
</style>
</head>
<body>
  <div class="badges">
    <span class="badge swap">Swap</span>
    <span class="badge free">Free</span>
    <span class="badge type">Houseplant</span>
  </div>
  <div class="meta"><span>2.1 mi</span><span>Listed by Priya</span><b>4.9 ★</b></div>
</body>
</html>
