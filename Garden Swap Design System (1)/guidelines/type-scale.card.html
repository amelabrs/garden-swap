<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Editorial serif display + grotesque UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; background: var(--card); }
  .stack { display: flex; flex-direction: column; gap: 13px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .spec { width: 120px; flex-shrink: 0; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
  .serif { font-family: var(--font-serif); color: var(--ink); }
  .sans { font-family: var(--font-sans); color: var(--ink); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="spec">3xl serif · 400</span><span class="serif" style="font-size:var(--text-3xl);letter-spacing:var(--tracking-tight)">Plants near you</span></div>
    <div class="line"><span class="spec">xl serif · 500</span><span class="serif" style="font-size:var(--text-xl);font-weight:500">Monstera Deliciosa</span></div>
    <div class="line"><span class="spec">lg serif · 400 it.</span><span class="serif" style="font-size:var(--text-lg);font-style:italic">The Green Post</span></div>
    <div class="line"><span class="spec">md sans · 600</span><span class="sans" style="font-size:var(--text-md);font-weight:600">Request a Swap</span></div>
    <div class="line"><span class="spec">base sans · 400</span><span class="sans" style="font-size:var(--text-base)">Fresh cutting, looking for rare aroids.</span></div>
    <div class="line"><span class="spec">xs caps · 600</span><span class="sans gs-eyebrow">Within 10 miles</span></div>
  </div>
</body>
</html>
