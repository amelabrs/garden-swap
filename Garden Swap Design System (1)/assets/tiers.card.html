<!-- @dsCard group="Brand" viewport="700x170" name="Tier marks" subtitle="Growth metaphor: sprout → shrub → trees" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px; background: var(--card); }
  .row { display: flex; gap: 14px; }
  .tier { flex: 1; border-radius: var(--radius-card); padding: 18px; display: flex; flex-direction: column; gap: 6px; align-items: center; border: 1px solid var(--line); }
  .mark { width: 30px; height: 30px; }
  .name { font-family: var(--font-serif); font-weight: 500; font-size: var(--text-lg); }
  .price { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--text-subtle); }
  .sprout  { background: var(--mint-100); }
  .grower  { background: rgba(52,112,70,0.10); }
  .steward { background: var(--denim-100); }
</style>
</head>
<body>
  <div class="row">
    <div class="tier sprout">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="#1A4226" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
      <span class="name" style="color:var(--pine-700)">Sprout</span><span class="price">Free</span>
    </div>
    <div class="tier grower">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="#285C39" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-7l-2-2"/><path d="M17 8v.8A6 6 0 0 1 13.8 20v0H10v0A6.5 6.5 0 0 1 7 8h0a5 5 0 0 1 10 0Z"/><path d="m14 14-2 2"/></svg>
      <span class="name" style="color:var(--fern-600)">Grower</span><span class="price">₹99 / mo</span>
    </div>
    <div class="tier steward">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="#234E5B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 10v.2A3 3 0 0 1 8.9 16H5a3 3 0 0 1-1-5.8V10a3 3 0 0 1 6 0Z"/><path d="M7 16v6"/><path d="M13 19v3"/><path d="M12 19h8.3a1 1 0 0 0 .7-1.7L18 14h.3a1 1 0 0 0 .7-1.7L16 9h.2a1 1 0 0 0 .8-1.7L13 3l-1.4 1.5"/></svg>
      <span class="name" style="color:var(--denim-700)">Steward</span><span class="price">₹249 / mo</span>
    </div>
  </div>
</body>
</html>
