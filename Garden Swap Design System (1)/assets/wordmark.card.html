<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark" subtitle="Leaf mark + Newsreader serif, on pine and on paper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; display: flex; }
  .panel { flex: 1; display: flex; align-items: center; gap: 12px; padding: 26px 28px; }
  .on-pine { background: var(--pine-900); }
  .on-paper { background: var(--paper); }
  .mark { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: var(--radius-full); flex-shrink: 0; }
  .wm { font-family: var(--font-serif); font-size: 1.7rem; font-weight: 500; letter-spacing: var(--tracking-tight); white-space: nowrap; }
  .leaf { width: 23px; height: 23px; }
</style>
</head>
<body>
  <div class="panel on-pine">
    <div class="mark" style="background:var(--fern-500)">
      <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="#F4EDDF" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
    </div>
    <span class="wm" style="color:var(--paper)">Garden Swap</span>
  </div>
  <div class="panel on-paper">
    <div class="mark" style="background:var(--mint-100)">
      <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="#285C39" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
    </div>
    <span class="wm" style="color:var(--pine-900)">Garden Swap</span>
  </div>
</body>
</html>
